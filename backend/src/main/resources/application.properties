spring.application.name=intreview

# Groq LLM (OpenAI 호환). 연습 답변 STAR 첨삭 API용
# 키 없이 기동 가능 — 코칭 호출 시 503 (AI_NOT_CONFIGURED)
spring.ai.openai.base-url=${GROQ_BASE_URL:https://api.groq.com/openai}
spring.ai.openai.api-key=${GROQ_API_KEY:}
spring.ai.openai.chat.options.model=${GROQ_MODEL:llama-3.3-70b-versatile}
spring.ai.openai.chat.options.temperature=0.4

# CORS (프론트 개발 서버 등). 쉼표로 여러 출처 지정 가능.
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000

# H2 (개발) — 파일 저장: 재시작 후에도 데이터 유지 (프로젝트 루트 기준 ./data/)
spring.datasource.url=jdbc:h2:file:./data/intreview;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
